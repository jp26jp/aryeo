
site_name: Aryeo Python Client
site_description: Typed Python client for the Aryeo API

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            merge_init_into_class: true
            show_source: false
            show_signature_annotations: true
            show_root_heading: true
            show_submodules: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
